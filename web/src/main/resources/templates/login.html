<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Campus Event Booking System">
    <title>Login - Campus Booking</title>
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}" />
</head>
<body>
    <main class="auth-wrapper">
        <div class="card auth-card">
            <h1>Campus Booking</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 1.5rem;">Sign in to your account</p>
            
             <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
             <div th:if="${param.logout}" class="alert">You have been logged out.</div>
             <div th:if="${param.success}" class="alert alert-success">Registration successful! Please log in.</div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" autocomplete="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" autocomplete="current-password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>
            <div class="auth-link">
                <!-- This link correctly points to the /register URL handled by RegistrationController -->
                <p>No account? <a th:href="@{/register}">Create an account here</a></p>
            </div>
        </div>
    </main>
</body>
</html>
