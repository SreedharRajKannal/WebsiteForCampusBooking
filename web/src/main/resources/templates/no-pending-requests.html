<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="No pending requests for approval.">
    <title>All Caught Up</title>
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}" />
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <span class="brand">Campus Booking</span>
            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <button type="submit" class="btn btn-secondary">Logout</button>
            </form>
        </div>
    </header>
    
    <main class="container" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
        <div class="card" style="text-align: center; max-width: 500px; width: 100%; margin-top: -5rem;">
            <div style="font-size: 3.5rem; margin-bottom: 1rem; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));">🎉</div>
            <h1 style="font-size: 2rem; margin-bottom: 1rem;">All Caught Up!</h1>
            <p style="margin: 1.5rem 0 2rem; font-size: 1.1rem; color: var(--text-secondary); line-height: 1.5;">
                There are currently no booking requests that require your approval. Enjoy your day!
            </p>
            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                <a th:href="@{/no-pending-requests}" class="btn btn-secondary">Refresh</a>
                <a th:href="@{/approver/history}" class="btn btn-primary">View My History</a>
            </div>
        </div>
    </main>
    
    <footer class="copyright-footer">
        &copy; 2026 Campus Booking System
    </footer>
</body>
</html>
