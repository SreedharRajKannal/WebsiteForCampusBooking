<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Review pending booking requests">
    <title>Principal Dashboard</title>
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}" />
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <span class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                Campus Booking
            </span>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <span class="status-badge status-approved" style="background-color: rgba(228, 76, 101, 0.15); color: #e44c65; border-color: rgba(228, 76, 101, 0.3);">Principal</span>
                <span style="color: var(--text-secondary); font-size: 0.9rem;">Welcome, <strong th:text="${username}" style="color: #fff;">User</strong></span>
                <a th:href="@{/approver/history}" class="btn btn-secondary" style="padding: 0.4rem 0.8rem;">My History</a>
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="btn btn-secondary" style="padding: 0.4rem 0.8rem;">Logout</button>
                </form>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="flex-container">
            <div>
                <h1>Final Approval Queue</h1>
                <p style="color: var(--text-secondary);">Review and finalize incoming campus event requests.</p>
            </div>
        </div>
        
        <div class="card" style="padding: 1.5rem;">
            <div class="table-responsive">
                <table class="styled-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Event</th>
                            <th class="description-col">Description</th>
                            <th>Applicant</th>
                            <th>Facility</th>
                            <th>Date</th>
                            <th style="min-width: 250px;">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="booking : ${bookings}">
                            <td th:text="${booking.bookingId}" style="font-weight: 500; color: var(--accent-color);"></td>
                            <td th:text="${booking.eventName}"></td>
                            <td th:text="${booking.eventDescription}" style="font-size: 0.9rem;"></td>
                            <td th:text="${booking.user?.name}"></td>
                            <td th:text="${booking.facility?.name}"></td>
                            <td th:text="${booking.date != null ? #temporals.format(booking.date, 'dd/MM/yy') : 'N/A'}"></td>
                            <td>
                                <form th:action="@{'/bookings/' + ${booking.bookingId} + '/process'}" method="post" class="form-actions" style="margin: 0;">
                                     <input type="text" name="remark" placeholder="Add remark..." class="form-control" style="width: 140px; padding: 0.5rem;"/>
                                     <button type="submit" name="decision" value="approve" class="btn btn-approve" style="padding: 0.5rem 0.75rem;">Approve</button>
                                     <button type="submit" name="decision" value="reject" class="btn btn-reject" style="padding: 0.5rem 0.75rem;">Reject</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(bookings)}">
                            <td colspan="7" style="text-align: center; padding: 4rem; color: var(--text-secondary);">
                                <div style="font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.3;">🎉</div>
                                No booking requests are currently pending your approval.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <footer class="copyright-footer">
        &copy; 2026 Campus Booking System
    </footer>
</body>
</html>
