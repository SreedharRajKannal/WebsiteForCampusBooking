<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register an account for the Campus Event Booking System">
    <title>Register - Campus Booking</title>
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}" />
</head>
<body>
    <main class="auth-wrapper">
        <div class="card auth-card">
            <h1>Create Account</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Join to start booking venues</p>
            
             <div th:if="${param.error}" class="alert alert-danger" style="margin-bottom: 1.5rem;">
                <span th:text="${param.error}">Error message</span>
            </div>

            <form th:action="@{/register}" th:object="${registrationForm}" method="post">
                <div class="form-group">
                    <label for="name">Username</label>
                    <input type="text" th:field="*{name}" class="form-control" autocomplete="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" autocomplete="new-password" placeholder="Create a strong password" required>
                </div>
                
                <!-- Restored Role Selection -->
                <div class="form-group">
                    <label for="role">Register As</label>
                    <select th:field="*{role}" class="form-control" id="roleSelect" onchange="toggleSecretCode()">
                        <option value="ROLE_STUDENT">Student</option>
                        <option value="ROLE_STAFF_ADVISOR">Staff Advisor</option>
                        <option value="ROLE_HOD">HOD</option>
                        <option value="ROLE_DEAN">Dean</option>
                        <option value="ROLE_PRINCIPAL">Principal</option>
                    </select>
                </div>

                <!-- Secret Code Field (only for staff) -->
                <div class="form-group" id="secretCodeGroup" style="display: none;">
                    <label for="secretCode">Secret Code (Staff Only)</label>
                    <input type="text" th:field="*{secretCode}" class="form-control" placeholder="Enter staff authorization code">
                </div>
                
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">Register Account</button>
            </form>
            
             <div class="auth-link">
                <p>Already have an account? <a th:href="@{/login}">Login here</a></p>
            </div>
        </div>
    </main>
    
    <script>
        function toggleSecretCode() {
            var role = document.getElementById('roleSelect').value;
            var secretGroup = document.getElementById('secretCodeGroup');
            if (role !== 'ROLE_STUDENT') {
                secretGroup.style.display = 'block';
            } else {
                secretGroup.style.display = 'none';
            }
        }
        // Run on load in case a staff role was pre-selected
        toggleSecretCode();
    </script>
</body>
</html>
