<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View your campus event booking requests">
    <title>Student Dashboard</title>
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}" />
</head>
<body>
    <header class="app-header">
        <div class="header-inner">
            <span class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                Campus Booking
            </span>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <span style="color: var(--text-secondary); font-size: 0.9rem;">Welcome, <strong th:text="${username}" style="color: #fff;">Student</strong></span>
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="btn btn-secondary" style="padding: 0.4rem 0.8rem;">Logout</button>
                </form>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="flex-container">
            <div>
                <h1>My Booking Requests</h1>
                <p style="color: var(--text-secondary);">Track the real-time status of your event applications.</p>
            </div>
            <a th:href="@{/bookings/new}" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Application
            </a>
        </div>
        
        <div class="card" style="padding: 1.5rem;">
            <div class="table-responsive">
                <table class="styled-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Event</th>
                            <th class="description-col">Description</th>
                            <th>Facility</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Remarks</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="booking : ${bookings}">
                            <td th:text="${booking.bookingId}" style="font-weight: 500; color: var(--accent-color);"></td>
                            <td th:text="${booking.eventName}"></td>
                            <td th:text="${booking.eventDescription}"></td>
                            <td th:text="${booking.facility?.name}"></td>
                            <td th:text="${booking.date != null ? #temporals.format(booking.date, 'dd/MM/yy') : 'N/A'}"></td>
                            <td>
                                <span class="status-badge"
                                    th:text="${#strings.replace(booking.status.name(), '_', ' ')}"
                                    th:classappend="${#strings.contains(booking.status.name(), 'PENDING')} ? 'status-pending' : (${booking.status.name() == 'APPROVED'} ? 'status-approved' : 'status-rejected')">
                                </span>
                            </td>
                            <td th:text="${booking.remarks}" style="font-size: 0.85rem; color: var(--text-secondary);"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(bookings)}">
                            <td colspan="7" style="text-align: center; padding: 4rem; color: var(--text-secondary);">
                                <div style="font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.3;">📋</div>
                                You haven't made any booking requests yet.<br>Click "New Application" to get started.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <footer class="copyright-footer">
        &copy; 2026 Campus Booking System
    </footer>
</body>
</html>
